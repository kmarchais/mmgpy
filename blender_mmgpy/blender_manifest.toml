schema_version = "1.0.0"

id = "mmgpy"
version = "0.15.0-dev.0"
name = "MMGpy - Mesh Remeshing"
tagline = "Adaptive surface remeshing via the MMG library"
maintainer = "Kevin Marchais <kevinmarchais@gmail.com>"
type = "add-on"

# Blender version compatibility
blender_version_min = "4.2.0"

# License
license = ["SPDX:GPL-3.0-or-later"]
copyright = ["2026 Kevin Marchais"]

# Website and documentation (deep-link into the extension docs page)
website = "https://kmarchais.github.io/mmgpy/latest/blender-extension"

# Category for the addon
tags = ["Mesh", "Modeling"]

# NOTE: the ``wheels = [...]`` block is generated by the release CI
# (see .github/workflows/build-blender-extension.yml) from the wheels
# downloaded for the target Python ABI + platform. We don't carry a
# hard-coded list here because the right set depends on the target.

# No ``[permissions]`` block: the remesh path is fully in-memory
# (Blender mesh -> NumPy -> PyVista -> MMG -> Blender mesh). MMG runs in
# the process; no filesystem, network or clipboard access is taken.
