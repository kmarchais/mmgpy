repos:
  # prek builtin hooks (Rust-native, faster)
  - repo: builtin
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=15000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: mkdocs.yml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  # pre-commit-hooks for Python-specific checks (no builtin equivalent)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: check-illegal-windows-names
      - id: debug-statements
      - id: name-tests-test

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.13"
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py39-plus, --keep-runtime-typing]

  - repo: https://github.com/DanielNoord/pydocstringformatter
    rev: v0.7.5
    hooks:
      - id: pydocstringformatter
        args:
          [
            "--style {numpydoc,pep257}",
            "--no-strip-whitespace",
            "--no-capitalize-first-letter",
          ]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        files: ^.*\.(py|rst|md)$

  - repo: https://github.com/astral-sh/ty-pre-commit
    # v0.0.48
    rev: a71646c845a122391e3ce3a43502fcf4003d1efa
    hooks:
      - id: ty

  - repo: local
    hooks:
      - id: sync-versions
        name: sync downstream version files with pyproject.toml
        entry: uv run --no-project python .github/scripts/sync_versions.py
        language: system
        # Trigger when any of the pinned version files is touched. The
        # script rewrites the conda recipe and Blender manifest to match
        # pyproject.toml; prek then surfaces the modification so the
        # author re-stages and commits the synced state.
        files: ^(pyproject\.toml|conda/recipe\.yaml|blender_mmgpy/blender_manifest\.toml)$
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v22.1.5"
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "v3.8.3"
    hooks:
      - id: prettier
        types_or: [yaml, markdown]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: "v0.25"
    hooks:
      - id: validate-pyproject
        additional_dependencies: ["validate-pyproject-schema-store[all]"]
