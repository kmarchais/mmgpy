name: Conda Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  conda-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.13"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.36
        with:
          recipe-path: conda/recipe.yaml
          artifact-name: conda-package-${{ matrix.os }}-py${{ matrix.python-version }}
          build-args: >-
            --variant-config conda/conda_build_config.yaml
            --variant "python=${{ matrix.python-version }}"
