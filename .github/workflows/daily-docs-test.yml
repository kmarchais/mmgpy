name: Daily Docs Test

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # Allow manual triggering
  pull_request: # TODO: remove after verifying fix
    paths:
      - .github/workflows/daily-docs-test.yml

jobs:
  test-released-docs:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    runs-on: ubuntu-latest

    steps:
      - name: Get latest PyPI version
        id: version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/mmgpy/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest PyPI version: $VERSION"

      - uses: actions/checkout@v4
        with:
          ref: v${{ steps.version.outputs.version }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmesa6-dev libgl1-mesa-dev xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install mmgpy from PyPI with test dependencies
        run: |
          uv venv
          uv pip install mmgpy pytest pytest-codeblocks

      - name: Verify mmgpy import
        run: |
          source .venv/bin/activate
          python -c "import vtk; print('VTK', vtk.vtkVersion.GetVTKVersion())"
          python -c "import mmgpy; print('mmgpy', mmgpy.__version__)"

      - name: Debug - conftest import with catchsegv
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          source .venv/bin/activate
          # Instrument conftest.py with print statements
          sed -i '1i import sys; print("conftest: line 1", flush=True)' docs/conftest.py
          sed -i '/^import numpy/i print("conftest: before numpy import", flush=True)' docs/conftest.py
          sed -i '/^import pyvista/i print("conftest: before pyvista import", flush=True)' docs/conftest.py
          sed -i '/^from scipy/i print("conftest: before scipy import", flush=True)' docs/conftest.py
          sed -i '/^_VERTS_3D/i print("conftest: before _make_3d_mesh", flush=True)' docs/conftest.py
          sed -i '/^_VERTS_2D/i print("conftest: before _make_2d_mesh", flush=True)' docs/conftest.py
          sed -i '/^_VERTS_SURF/i print("conftest: before _make_surface_mesh", flush=True)' docs/conftest.py
          sed -i '/^import mmgpy/i print("conftest: before mmgpy import", flush=True)' docs/conftest.py
          sed -i '/^_io_mod.read/i print("conftest: before monkeypatch", flush=True)' docs/conftest.py
          catchsegv python -u -c "
          import sys, os
          os.environ['PYVISTA_OFF_SCREEN'] = 'true'
          sys.path.insert(0, 'docs')
          import conftest
          print('conftest loaded OK', flush=True)
          " 2>&1 || true

      - name: Test documentation code blocks
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
          PYTHONFAULTHANDLER: "1"
        run: |
          source .venv/bin/activate
          # Re-checkout clean conftest
          git checkout docs/conftest.py
          pytest --codeblocks docs/ -v -s -p faulthandler

      - name: Run examples
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          shopt -s globstar
          source .venv/bin/activate
          for f in examples/**/*.py; do
            case "$f" in
              examples/ui/*) continue ;;
              examples/mmg2d/implicit_2d_domain_meshing.py) continue ;;
              examples/mmgs/implicit_surface_domain_meshing.py) continue ;;
            esac
            echo "::group::Running $f"
            python "$f"
            echo "::endgroup::"
          done
