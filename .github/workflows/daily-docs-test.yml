name: Daily Docs Test

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # Allow manual triggering
  pull_request: # TODO: remove after verifying fix
    paths:
      - .github/workflows/daily-docs-test.yml

jobs:
  test-released-docs:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    runs-on: ubuntu-latest

    steps:
      - name: Get latest PyPI version
        id: version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/mmgpy/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest PyPI version: $VERSION"

      - uses: actions/checkout@v4
        with:
          ref: v${{ steps.version.outputs.version }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmesa6-dev libgl1-mesa-dev xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install mmgpy from PyPI with test dependencies
        run: |
          uv venv
          uv pip install mmgpy pytest pytest-codeblocks

      - name: Verify mmgpy import
        run: |
          source .venv/bin/activate
          python -c "import vtk; print('VTK', vtk.vtkVersion.GetVTKVersion())"
          python -c "import mmgpy; print('mmgpy', mmgpy.__version__)"

      - name: Debug - reproduce conftest step by step
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          source .venv/bin/activate
          python -u -X faulthandler << 'PYEOF'
          import os, sys
          os.environ["PYVISTA_OFF_SCREEN"] = "true"

          print("1. numpy", flush=True)
          import numpy as np

          print("2. pyvista", flush=True)
          import pyvista as pv
          from scipy.spatial import Delaunay

          print("3. _make_3d_mesh", flush=True)
          x = np.linspace(0, 1, 5)
          xx, yy, zz = np.meshgrid(x, x, x, indexing="ij")
          pts = np.column_stack([xx.ravel(), yy.ravel(), zz.ravel()])
          tetra = pv.PolyData(pts).delaunay_3d()
          v3d = np.array(tetra.points, dtype=np.float64)
          c3d = tetra.cells_dict[pv.CellType.TETRA].astype(np.int32)

          print("4. _make_2d_mesh", flush=True)
          x2 = np.linspace(0, 1, 10)
          xx2, yy2 = np.meshgrid(x2, x2)
          pts2 = np.column_stack([xx2.ravel(), yy2.ravel()])
          tri = Delaunay(pts2)
          v2d, c2d = pts2.astype(np.float64), tri.simplices.astype(np.int32)

          print("5. _make_surface_mesh", flush=True)
          sphere = pv.Sphere(theta_resolution=10, phi_resolution=10).triangulate()
          vs = np.array(sphere.points, dtype=np.float64)
          cs = sphere.faces.reshape(-1, 4)[:, 1:].astype(np.int32)

          print("6. import mmgpy", flush=True)
          import mmgpy
          import mmgpy._io as _io_mod
          from mmgpy import Mesh

          print("7. monkeypatch", flush=True)
          real_read = _io_mod.read
          def fake_read(source, mesh_kind=None):
              return Mesh(v3d.copy(), c3d.copy())
          _io_mod.read = fake_read
          mmgpy.read = fake_read

          print("8. exec code block", flush=True)
          code = "import mmgpy\nmesh = mmgpy.read('input.mesh')\nopts = mmgpy.Mmg3DOptions(hmax=0.1)\nresult = mesh.remesh(opts)\nprint('result:', result, flush=True)"
          exec(code, {"__MODULE__": "__main__"})
          print("ALL PASSED", flush=True)
          PYEOF

      - name: Test documentation code blocks
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
          PYTHONFAULTHANDLER: "1"
        run: |
          source .venv/bin/activate
          # Re-checkout clean conftest
          git checkout docs/conftest.py
          pytest --codeblocks docs/ -v -s -p faulthandler

      - name: Run examples
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          shopt -s globstar
          source .venv/bin/activate
          for f in examples/**/*.py; do
            case "$f" in
              examples/ui/*) continue ;;
              examples/mmg2d/implicit_2d_domain_meshing.py) continue ;;
              examples/mmgs/implicit_surface_domain_meshing.py) continue ;;
            esac
            echo "::group::Running $f"
            python "$f"
            echo "::endgroup::"
          done
