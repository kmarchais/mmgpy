name: Daily Docs Test

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # Allow manual triggering

jobs:
  test-released-docs:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    runs-on: ubuntu-latest
    # Bound the whole job; individual example timeouts (below) still catch
    # specific hangs without burning through the GitHub default 6h budget.
    timeout-minutes: 30

    steps:
      - name: Get latest PyPI version
        id: version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/mmgpy/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest PyPI version: $VERSION"

      - uses: actions/checkout@v6
        with:
          ref: v${{ steps.version.outputs.version }}

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install mmgpy from PyPI with test dependencies
        run: |
          uv venv
          uv pip install mmgpy pytest pytest-codeblocks

      - name: Test documentation code blocks
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          source .venv/bin/activate
          pytest --codeblocks docs/ -v

      - name: Run examples
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          shopt -s globstar
          source .venv/bin/activate
          for f in examples/**/*.py; do
            case "$f" in
              examples/ui/*) continue ;;  # UI examples need a display server
            esac
            echo "::group::Running $f"
            timeout --signal=SIGTERM --kill-after=10s 5m python "$f"
            echo "::endgroup::"
          done
