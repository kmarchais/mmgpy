name: Daily Docs Test

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # Allow manual triggering
  pull_request: # TODO: remove after verifying fix
    paths:
      - .github/workflows/daily-docs-test.yml

jobs:
  test-released-docs:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    runs-on: ubuntu-latest

    steps:
      - name: Get latest PyPI version
        id: version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/mmgpy/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest PyPI version: $VERSION"

      - uses: actions/checkout@v4
        with:
          ref: v${{ steps.version.outputs.version }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmesa6-dev libgl1-mesa-dev xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install mmgpy from PyPI with test dependencies
        run: |
          uv venv
          uv pip install mmgpy pytest pytest-codeblocks

      - name: Verify mmgpy import
        run: |
          source .venv/bin/activate
          python -c "import vtk; print('VTK', vtk.vtkVersion.GetVTKVersion())"
          python -c "import mmgpy; print('mmgpy', mmgpy.__version__)"

      - name: Debug - isolate conftest crash
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          source .venv/bin/activate
          python -u -c "
          import faulthandler, sys, os
          faulthandler.enable()
          sys.stdout = os.fdopen(sys.stdout.fileno(), 'w', buffering=1)
          print('Step 1: importing numpy', flush=True)
          import numpy as np
          print('Step 2: importing pyvista', flush=True)
          import pyvista as pv
          print('Step 3: pv.Sphere', flush=True)
          sphere = pv.Sphere()
          print('Step 4: pv.PolyData + delaunay_3d', flush=True)
          pts = np.random.rand(50, 3)
          cloud = pv.PolyData(pts)
          tetra = cloud.delaunay_3d()
          print('Step 5: importing mmgpy', flush=True)
          import mmgpy
          print('Step 6: Mesh + remesh', flush=True)
          verts = np.array(tetra.points, dtype=np.float64)
          cells = tetra.cells_dict[pv.CellType.TETRA].astype(np.int32)
          mesh = mmgpy.Mesh(verts, cells)
          mesh.remesh(mmgpy.Mmg3DOptions(hmax=0.5))
          print('Step 7: importing scipy Delaunay', flush=True)
          from scipy.spatial import Delaunay
          tri = Delaunay(np.random.rand(20, 2))
          print('All steps passed!', flush=True)
          "

      - name: Test documentation code blocks
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
          PYTHONFAULTHANDLER: "1"
        run: |
          source .venv/bin/activate
          pytest --codeblocks docs/ -v -s -p faulthandler

      - name: Run examples
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          shopt -s globstar
          source .venv/bin/activate
          for f in examples/**/*.py; do
            case "$f" in
              examples/ui/*) continue ;;
              examples/mmg2d/implicit_2d_domain_meshing.py) continue ;;
              examples/mmgs/implicit_surface_domain_meshing.py) continue ;;
            esac
            echo "::group::Running $f"
            python "$f"
            echo "::endgroup::"
          done
