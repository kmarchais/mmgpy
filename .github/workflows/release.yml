name: Release

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version to release (MAJOR.MINOR.PATCH). Run with dry_run=true first to see current state."
        required: true
        type: string
      next_dev_version:
        description: "Next dev version (MAJOR.MINOR.PATCH.devN)."
        required: true
        type: string
      dry_run:
        description: "Preview only: validate inputs and print current/target state without tagging or pushing."
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.state.outputs.current_version }}
      latest_release: ${{ steps.state.outputs.latest_release }}
      head_sha: ${{ steps.state.outputs.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate input formats
        run: |
          if ! [[ "${{ inputs.target_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::target_version must be MAJOR.MINOR.PATCH (got '${{ inputs.target_version }}')"
            exit 1
          fi
          if ! [[ "${{ inputs.next_dev_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.dev[0-9]+$ ]]; then
            echo "::error::next_dev_version must be MAJOR.MINOR.PATCH.devN (got '${{ inputs.next_dev_version }}')"
            exit 1
          fi

      - name: Read current state
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT=$(grep -E '^version = "' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "(none)"')
          HEAD=$(git rev-parse HEAD)
          {
            echo "current_version=$CURRENT"
            echo "latest_release=$LATEST"
            echo "head_sha=$HEAD"
          } >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Validate version ordering
        env:
          CURRENT: ${{ steps.state.outputs.current_version }}
          TARGET: ${{ inputs.target_version }}
          NEXT_DEV: ${{ inputs.next_dev_version }}
        run: |
          uv run --no-project --with packaging python - <<'EOF'
          import os, sys
          from packaging.version import Version

          current = Version(os.environ["CURRENT"])
          target = Version(os.environ["TARGET"])
          next_dev = Version(os.environ["NEXT_DEV"])
          errors = []
          if target <= current:
              errors.append(f"target_version ({target}) must be > current pyproject version ({current})")
          if next_dev <= target:
              errors.append(f"next_dev_version ({next_dev}) must be > target_version ({target})")
          for e in errors:
              print(f"::error::{e}")
          sys.exit(1 if errors else 0)
          EOF

      - name: Refuse if target already released
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ inputs.target_version }}" >/dev/null 2>&1; then
            echo "::error::Release v${{ inputs.target_version }} already exists."
            exit 1
          fi

      - name: Check build-and-test is green on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh run list --workflow build-and-test.yml --branch main --limit 1 \
            --json conclusion,status,headSha,databaseId \
            --jq '.[0]')
          CONCLUSION=$(echo "$LATEST" | jq -r '.conclusion // "in_progress"')
          STATUS=$(echo "$LATEST" | jq -r '.status')
          RUN_SHA=$(echo "$LATEST" | jq -r '.headSha')
          RUN_ID=$(echo "$LATEST" | jq -r '.databaseId')
          echo "build-and-test: conclusion=$CONCLUSION status=$STATUS sha=$RUN_SHA run_id=$RUN_ID"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Latest build-and-test run on main is '$CONCLUSION' (status: $STATUS). Refusing to release."
            exit 1
          fi
          if [ "$RUN_SHA" != "${{ steps.state.outputs.head_sha }}" ]; then
            echo "::warning::Latest green build-and-test run was for $RUN_SHA but main HEAD is ${{ steps.state.outputs.head_sha }}. Proceeding, but newer commits have not been validated."
          fi

      - name: Summarise plan
        run: |
          {
            echo "## Release plan"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Current pyproject version | \`${{ steps.state.outputs.current_version }}\` |"
            echo "| Latest GitHub release | \`${{ steps.state.outputs.latest_release }}\` |"
            echo "| Target release version | \`${{ inputs.target_version }}\` |"
            echo "| Next dev version | \`${{ inputs.next_dev_version }}\` |"
            echo "| main HEAD | \`${{ steps.state.outputs.head_sha }}\` |"
            echo "| Dry run | \`${{ inputs.dry_run }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: preflight
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Bump to release version
        run: uv run --no-project python .github/scripts/sync_versions.py --set "${{ inputs.target_version }}"

      - name: Commit release on release branch
        run: |
          BRANCH="release/v${{ inputs.target_version }}"
          git checkout -b "$BRANCH"
          git add pyproject.toml conda/recipe.yaml blender_mmgpy/blender_manifest.toml
          git commit -m "release: v${{ inputs.target_version }}"
          git push origin "$BRANCH"

      - name: Tag release commit
        run: |
          git tag -a "v${{ inputs.target_version }}" -m "v${{ inputs.target_version }}"
          git push origin "v${{ inputs.target_version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.target_version }}" \
            --title "v${{ inputs.target_version }}" \
            --generate-notes \
            --target "v${{ inputs.target_version }}"

      # Releases created with GITHUB_TOKEN don't fire the `release: published`
      # event for downstream workflows, so we dispatch the wheel build
      # explicitly against the freshly created tag.
      - name: Dispatch wheel build + PyPI publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-wheels.yml \
            --ref "v${{ inputs.target_version }}" \
            -f publish_to_pypi=true

      - name: Bump to next dev version
        run: uv run --no-project python .github/scripts/sync_versions.py --set "${{ inputs.next_dev_version }}"

      - name: Commit dev bump
        run: |
          git add pyproject.toml conda/recipe.yaml blender_mmgpy/blender_manifest.toml
          git commit -m "chore: bump to ${{ inputs.next_dev_version }}"
          git push origin "release/v${{ inputs.target_version }}"

      - name: Open PR back to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ inputs.target_version }}" \
            --title "release: v${{ inputs.target_version }}" \
            --body "Tagged \`v${{ inputs.target_version }}\` on the release commit. This PR also bumps to \`${{ inputs.next_dev_version }}\`. **Merge with a merge commit (no squash)** so the tagged commit stays reachable from main."
