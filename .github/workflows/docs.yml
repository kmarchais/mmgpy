name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libvtk9-dev qtbase5-dev qt5-qmake libgl1-mesa-dev libglu1-mesa-dev freeglut3-dev
          version: 1.0

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Configure Git for mike
        if: github.event_name == 'push' || github.event_name == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run mike deploy dev --push

      - name: Deploy versioned docs
        if: github.event_name == 'release'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MINOR_VERSION=$(echo "$VERSION" | cut -d. -f1-2)
          uv run mike deploy "$MINOR_VERSION" latest --update-aliases --push
          uv run mike set-default latest --push
