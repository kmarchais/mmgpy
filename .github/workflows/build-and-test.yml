name: Build and Test

on:
  push:
    branches: [main]
  pull_request: # Any pull request
  workflow_dispatch: # Allow manual triggering of the workflow
  schedule:
    - cron: "0 0 * * *" # Run at midnight UTC every day

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.14"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install GL libraries for offscreen rendering
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libosmesa6-dev libgl1-mesa-dev

      - run: uv sync -v
      - run: uv run python -c "import mmgpy"
      - name: Run tests with coverage
        run: uv run pytest --cov=src/mmgpy --cov-report=term-missing --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Test documentation code blocks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        env:
          PYVISTA_OFF_SCREEN: "true"
          MPLBACKEND: Agg
        run: uv run pytest --codeblocks docs/ -v

      - name: Run examples
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        env:
          MPLBACKEND: Agg
          PYVISTA_OFF_SCREEN: "true"
        run: |
          set -euo pipefail
          shopt -s globstar
          for f in examples/**/*.py; do
            case "$f" in
              examples/ui/*) continue ;;  # UI examples need a display server
              examples/mmg2d/implicit_2d_domain_meshing.py) continue ;;  # requires specific input assets
              examples/mmgs/implicit_surface_domain_meshing.py) continue ;;  # requires specific input assets
            esac
            echo "::group::Running $f"
            uv run python "$f"
            echo "::endgroup::"
          done
        shell: bash

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
