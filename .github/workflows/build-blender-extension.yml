# Build Blender Extension packages for all (platform, blender-python) combos.
#
# Triggered by ``Build Wheels`` completing on a release (so mmgpy wheels for
# every platform/ABI are already sitting in that run's artifacts).
# Reuses the wheels artifacts in place of ``pip install mmgpy`` so we don't
# depend on PyPI publish having completed yet — the wheel that *will* be on
# PyPI is the same one we're bundling.

name: Build Blender Extension

on:
  workflow_run:
    workflows: ["Build Wheels"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a completed 'Build Wheels' workflow to consume artifacts from"
        required: true
        type: string
      upload_to_release:
        description: "Upload built zips to the latest release"
        required: false
        default: false
        type: boolean

jobs:
  build-extension:
    # Run when triggered by a successful Build Wheels run for a release:
    # either the historical ``release`` event path, or the current path
    # where the release workflow dispatches Build Wheels against the new
    # ``v*`` tag (``workflow_run.event == 'workflow_dispatch'`` with a
    # tag-shaped ``head_branch``). Also runs on direct workflow_dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'release' ||
        (github.event.workflow_run.event == 'workflow_dispatch' &&
         startsWith(github.event.workflow_run.head_branch, 'v'))))
    strategy:
      fail-fast: false
      matrix:
        include:
          # Blender 4.2 LTS .. 4.5 ship Python 3.11.
          - {
              blender_min: "4.2",
              py: "3.11",
              abi: "cp311",
              platform: linux-x64,
              os: ubuntu-latest,
              wheels_artifact: wheels-linux-x86_64,
              pip_platform: manylinux_2_28_x86_64,
            }
          - {
              blender_min: "4.2",
              py: "3.11",
              abi: "cp311",
              platform: windows-x64,
              os: windows-latest,
              wheels_artifact: wheels-windows,
              pip_platform: win_amd64,
            }
          - {
              blender_min: "4.2",
              py: "3.11",
              abi: "cp311",
              platform: macos-arm64,
              os: macos-latest,
              wheels_artifact: wheels-macos,
              pip_platform: macosx_11_0_arm64,
            }
          # Blender 5.0+ ships Python 3.13.
          - {
              blender_min: "5.0",
              py: "3.13",
              abi: "cp313",
              platform: linux-x64,
              os: ubuntu-latest,
              wheels_artifact: wheels-linux-x86_64,
              pip_platform: manylinux_2_28_x86_64,
            }
          - {
              blender_min: "5.0",
              py: "3.13",
              abi: "cp313",
              platform: windows-x64,
              os: windows-latest,
              wheels_artifact: wheels-windows,
              pip_platform: win_amd64,
            }
          - {
              blender_min: "5.0",
              py: "3.13",
              abi: "cp313",
              platform: macos-arm64,
              os: macos-latest,
              wheels_artifact: wheels-macos,
              pip_platform: macosx_11_0_arm64,
            }
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}, py${{ matrix.py }})
    permissions:
      actions: read # download-artifact across workflow runs
      contents: read

    steps:
      # For ``workflow_run`` events, ``github.ref`` is the default branch
      # (typically main), not the ref the upstream workflow ran on. Without
      # an explicit ``ref``, we would read main's ``pyproject.toml`` (which
      # is already bumped to the next dev version after a release lands)
      # and embed the wrong version in the extension zip name and manifest.
      # Pin to the upstream run's head_branch (e.g. ``v0.14.0``) so the
      # version matches the wheels we are bundling.
      - uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.head_branch
                || github.ref }}

      - name: Set up Python ${{ matrix.py }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync version + dependency pin from pyproject.toml
        run: uv run --no-project python .github/scripts/sync_versions.py

      - name: Download wheels artifact from build-wheels run
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.wheels_artifact }}
          path: blender_mmgpy/wheels/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.id
                || inputs.run_id }}

      - name: Keep only the matching mmgpy wheel
        working-directory: blender_mmgpy/wheels
        shell: bash
        run: |
          set -euo pipefail
          for f in mmgpy-*.whl; do
            if [[ "$f" == *-${{ matrix.abi }}-${{ matrix.abi }}-* ]]; then
              echo "Keep:  $f"
            else
              echo "Drop:  $f"
              rm "$f"
            fi
          done
          ls -la

      - name: Verify only the mmgpy wheel is bundled
        working-directory: blender_mmgpy/wheels
        shell: bash
        run: |
          set -euo pipefail
          # The headless refactor (no PyVista, scipy, rich, etc. in the
          # `import mmgpy` path) means the Blender add-on only needs the
          # compiled mmgpy wheel. numpy is bundled with Blender; everything
          # else mmgpy used to pull in is now lazy-loaded behind a
          # __getattr__ and never reached from the operator code path.
          shopt -s nullglob
          wheels=( *.whl )
          if (( ${#wheels[@]} != 1 )); then
            echo "Expected exactly one wheel (mmgpy), got: ${wheels[*]}" >&2
            exit 1
          fi
          case "${wheels[0]}" in
            mmgpy-*) echo "OK: bundling ${wheels[0]}" ;;
            *) echo "Unexpected wheel: ${wheels[0]}" >&2; exit 1 ;;
          esac

      - name: Strip pyvista/scipy/rich from the bundled wheel METADATA
        working-directory: blender_mmgpy/wheels
        shell: bash
        run: |
          set -euo pipefail
          # The Blender extension never imports the lazy pyvista- or
          # scipy-coupled paths, so the bundled mmgpy wheel's METADATA
          # ``Requires-Dist`` is rewritten to drop those deps. The numpy
          # floor is also widened from ``>=2.0.2`` to ``>=1.26`` so the
          # extension can install on Blender 4.2 LTS (which ships numpy
          # 1.26.x) as well as Blender 5.0 (numpy 2.x). The compiled
          # ``_mmgpy.so`` and every Python module in the wheel are left
          # untouched -- this is a METADATA-only strip.
          for wheel in mmgpy-*.whl; do
            python ../../.github/scripts/strip_blender_wheel_metadata.py "$wheel"
          done

      - name: Verify the stripped METADATA matches the slim contract
        working-directory: blender_mmgpy/wheels
        shell: bash
        run: |
          set -euo pipefail
          for wheel in mmgpy-*.whl; do
            metadata=$(unzip -p "$wheel" '*.dist-info/METADATA')
            if [[ -z "$metadata" ]]; then
              echo "FAIL: no METADATA found in $wheel" >&2
              exit 1
            fi
            for forbidden in pyvista scipy rich patchelf typing-extensions; do
              if echo "$metadata" | grep -qE "^Requires-Dist:\\s*${forbidden}(\\W|$)"; then
                echo "FAIL: $wheel still requires $forbidden" >&2
                echo "$metadata" | grep -E "^Requires-Dist:" >&2
                exit 1
              fi
            done
            if ! echo "$metadata" | grep -qE "^Requires-Dist:\\s*numpy>=1\\.26"; then
              echo "FAIL: $wheel does not declare loosened numpy floor" >&2
              echo "$metadata" | grep -E "^Requires-Dist:\\s*numpy" >&2
              exit 1
            fi
            echo "OK: $wheel METADATA matches the slim contract"
          done

      - name: Inject ``wheels`` and ``platforms`` into the manifest
        working-directory: blender_mmgpy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path("blender_manifest.toml")
          text = manifest.read_text().rstrip()

          wheels = sorted(
              p.name for p in Path("wheels").iterdir()
              if p.suffix == ".whl"
          )
          wheels_block = "wheels = [\n" + "".join(
              f'    "./wheels/{w}",\n' for w in wheels
          ) + "]\n"

          # Each CI zip targets exactly one Blender platform identifier.
          # Declaring it here gives Blender a sanity check at install
          # time and makes the manifest in the zip self-describing.
          platform = "${{ matrix.platform }}"
          platforms_block = f'platforms = ["{platform}"]\n'

          manifest.write_text(
              text + "\n\n" + wheels_block + "\n" + platforms_block,
          )
          print(
              f"Injected {len(wheels)} wheels + platforms = ['{platform}']"
              " into the manifest",
          )
          PY

      - name: Build the extension zip
        id: zip
        working-directory: blender_mmgpy
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import zipfile
          from pathlib import Path

          # The manifest version is the source of truth.
          manifest_text = Path("blender_manifest.toml").read_text()
          version = re.search(
              r'^version\s*=\s*"([^"]+)"', manifest_text, re.MULTILINE,
          ).group(1)

          platform = "${{ matrix.platform }}"
          py = "${{ matrix.py }}"
          out = Path(f"mmgpy-blender-extension-{version}-{platform}-py{py}.zip")

          # Explicit allowlist so we never accidentally ship build artefacts
          # (``build/``, ``__pycache__``, leftover zips, ``build.sh``,
          # which is a build-time helper only).
          shipped_files = (
              "blender_manifest.toml",
              "__init__.py",
              "_register.py",
              "operators.py",
              "panels.py",
              "preferences.py",
              "properties.py",
              "utils.py",
              "README.md",
          )

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for name in shipped_files:
                  if Path(name).exists():
                      zf.write(name, name)
              for wheel in sorted(Path("wheels").iterdir()):
                  if wheel.suffix == ".whl":
                      zf.write(wheel, wheel.as_posix())

          size_mb = out.stat().st_size / (1024 * 1024)
          print(f"Built {out} ({size_mb:.1f} MB)")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"path={out}\n")
              fh.write(f"name={out.stem}\n")
          PY

      - name: Validate zip structure
        working-directory: blender_mmgpy
        shell: bash
        run: |
          python - <<'PY'
          import sys
          import tomllib
          import zipfile
          from pathlib import Path

          zip_path = Path("${{ steps.zip.outputs.path }}")
          with zipfile.ZipFile(zip_path) as zf:
              names = set(zf.namelist())

              if "blender_manifest.toml" not in names:
                  sys.exit("missing blender_manifest.toml at zip root")
              with zf.open("blender_manifest.toml") as f:
                  manifest = tomllib.loads(f.read().decode())

              for required in ("id", "version", "schema_version", "type"):
                  if required not in manifest:
                      sys.exit(f"manifest missing required key {required!r}")

              expected_platform = "${{ matrix.platform }}"
              if manifest.get("platforms") != [expected_platform]:
                  sys.exit(
                      f"platforms mismatch: manifest has "
                      f"{manifest.get('platforms')!r}, "
                      f"expected [{expected_platform!r}]",
                  )

              wheels = manifest.get("wheels", [])
              if not wheels:
                  sys.exit("manifest has no `wheels = [...]` block")
              # ``removeprefix`` (not ``lstrip``) — ``lstrip("./")`` would
              # strip *any* leading ``.``/``/`` characters in any order
              # rather than the literal ``./`` prefix.
              missing = [w for w in wheels if w.removeprefix("./") not in names]
              if missing:
                  sys.exit(f"wheels declared but not present in zip: {missing}")

              if "__init__.py" not in names:
                  sys.exit("zip is missing the add-on entry point __init__.py")
          print(
              f"OK: {len(names)} entries, "
              f"{len(wheels)} wheels declared & present",
          )
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension-${{ matrix.platform }}-py${{ matrix.py }}
          path: blender_mmgpy/${{ steps.zip.outputs.path }}
          retention-days: 30

      - name: Summary row
        shell: bash
        run: |
          size=$(du -h "blender_mmgpy/${{ steps.zip.outputs.path }}" | cut -f1)
          {
            echo "## ${{ matrix.platform }} / py${{ matrix.py }} (Blender ${{ matrix.blender_min }}+)"
            echo ""
            echo "| Package | Size |"
            echo "|---------|------|"
            echo "| ${{ steps.zip.outputs.path }} | $size |"
          } >> "$GITHUB_STEP_SUMMARY"

  # Combine the per-platform builds into a single zip whose manifest
  # declares ``platforms = [linux-x64, macos-arm64, windows-x64]`` and
  # whose ``wheels/`` directory holds wheels for every (platform, ABI).
  # This is the zip you upload to extensions.blender.org: the marketplace
  # expects one zip per submission, and Blender picks the right wheels at
  # install time.
  build-fat-extension:
    needs: build-extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.head_branch
                || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download all per-platform extension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: blender-extension-*
          path: per-platform/

      - name: Assemble fat zip
        id: fat
        run: |
          python - <<'PY'
          import os
          import re
          import shutil
          import tomllib
          import zipfile
          from pathlib import Path

          src = Path("per-platform")
          work = Path("fat-build")
          if work.exists():
              shutil.rmtree(work)
          work.mkdir()
          wheels_dir = work / "wheels"
          wheels_dir.mkdir()

          platforms: set[str] = set()
          version: str | None = None

          # Each artifact folder contains one single-platform zip.
          for sub in sorted(src.iterdir()):
              if not sub.is_dir():
                  continue
              zips = list(sub.glob("*.zip"))
              if len(zips) != 1:
                  raise SystemExit(f"expected exactly one zip in {sub}, got {zips}")
              zpath = zips[0]
              with zipfile.ZipFile(zpath) as zf:
                  with zf.open("blender_manifest.toml") as f:
                      manifest = tomllib.loads(f.read().decode())
                  platforms.update(manifest["platforms"])
                  if version is None:
                      version = manifest["version"]
                  elif version != manifest["version"]:
                      raise SystemExit(
                          f"version mismatch: {version!r} vs {manifest['version']!r}",
                      )
                  # Extract source files (first artifact wins; they're identical)
                  for name in zf.namelist():
                      if name.endswith("/") or name.startswith("wheels/"):
                          continue
                      target = work / name
                      target.parent.mkdir(parents=True, exist_ok=True)
                      if not target.exists():
                          with zf.open(name) as r, target.open("wb") as w:
                              shutil.copyfileobj(r, w)
                  # Extract wheels; pure-Python wheels (py3-none-any) repeat
                  # across artifacts byte-identically, so just overwrite.
                  for name in zf.namelist():
                      if not name.startswith("wheels/") or not name.endswith(".whl"):
                          continue
                      target = work / name
                      with zf.open(name) as r, target.open("wb") as w:
                          shutil.copyfileobj(r, w)

          assert version is not None

          # Rebuild the manifest with the union of platforms + all wheels.
          manifest_path = work / "blender_manifest.toml"
          text = manifest_path.read_text()
          # Strip any platforms/wheels blocks that were inherited from the
          # single-platform manifest, then append the multi-platform pair.
          text = re.sub(
              r"^\s*platforms\s*=\s*\[[^\]]*\]\s*\n",
              "",
              text,
              flags=re.MULTILINE,
          )
          text = re.sub(
              r"^\s*wheels\s*=\s*\[(?:[^\]]|\n)*\]\s*\n",
              "",
              text,
              flags=re.MULTILINE,
          )

          wheels = sorted(p.name for p in wheels_dir.iterdir() if p.suffix == ".whl")
          platforms_sorted = sorted(platforms)

          tail = (
              "platforms = ["
              + ", ".join(f'"{p}"' for p in platforms_sorted)
              + "]\n"
              + "wheels = [\n"
              + "".join(f'    "./wheels/{w}",\n' for w in wheels)
              + "]\n"
          )
          manifest_path.write_text(text.rstrip() + "\n\n" + tail)

          out = Path(f"mmgpy-blender-extension-{version}-all.zip")
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for p in sorted(work.rglob("*")):
                  if p.is_file():
                      zf.write(p, p.relative_to(work).as_posix())

          size_mb = out.stat().st_size / (1024 * 1024)
          print(
              f"Built {out} ({size_mb:.1f} MB), "
              f"{len(wheels)} wheels, platforms={platforms_sorted}",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"path={out}\n")
          PY

      - name: Validate fat zip
        run: |
          python - <<'PY'
          import sys
          import tomllib
          import zipfile
          from pathlib import Path

          zip_path = Path("${{ steps.fat.outputs.path }}")
          with zipfile.ZipFile(zip_path) as zf:
              names = set(zf.namelist())
              with zf.open("blender_manifest.toml") as f:
                  manifest = tomllib.loads(f.read().decode())
              for key in ("id", "version", "schema_version", "type"):
                  if key not in manifest:
                      sys.exit(f"manifest missing {key!r}")
              if set(manifest["platforms"]) != {"linux-x64", "macos-arm64", "windows-x64"}:
                  sys.exit(f"unexpected platforms: {manifest['platforms']}")
              # Each (platform, py) pair must contribute at least an mmgpy wheel.
              expected = {
                  ("manylinux", "cp311"),
                  ("manylinux", "cp313"),
                  ("macosx", "cp311"),
                  ("macosx", "cp313"),
                  ("win_amd64", "cp311"),
                  ("win_amd64", "cp313"),
              }
              found = set()
              for name in names:
                  if not name.startswith("wheels/mmgpy-"):
                      continue
                  for plat_marker, abi in expected:
                      if abi in name and plat_marker in name:
                          found.add((plat_marker, abi))
              missing = expected - found
              if missing:
                  sys.exit(f"missing mmgpy wheels for: {missing}")
              # Every declared wheel must exist.
              decl_missing = [w for w in manifest["wheels"] if w.removeprefix("./") not in names]
              if decl_missing:
                  sys.exit(f"declared but absent: {decl_missing}")
          print(f"OK: {len(names)} entries, {len(manifest['wheels'])} wheels declared")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension-all
          path: ${{ steps.fat.outputs.path }}
          retention-days: 30

      - name: Summary
        run: |
          size=$(du -h "${{ steps.fat.outputs.path }}" | cut -f1)
          {
            echo "## Fat zip (all platforms, all Blender Python ABIs)"
            echo ""
            echo "| Package | Size |"
            echo "|---------|------|"
            echo "| ${{ steps.fat.outputs.path }} | $size |"
          } >> "$GITHUB_STEP_SUMMARY"

  upload-to-release:
    needs: [build-extension, build-fat-extension]
    runs-on: ubuntu-latest
    # Mirror the build gate: any tag-driven Build Wheels completion, plus
    # explicit dispatch with ``upload_to_release=true``.
    if: >-
      (github.event_name == 'workflow_run' &&
       (github.event.workflow_run.event == 'release' ||
        (github.event.workflow_run.event == 'workflow_dispatch' &&
         startsWith(github.event.workflow_run.head_branch, 'v')))) ||
      (github.event_name == 'workflow_dispatch'
       && inputs.upload_to_release)
    permissions:
      contents: write

    steps:
      - name: Download all extension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: blender-extension-*
          merge-multiple: true
          path: extensions/

      - name: Resolve the release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' \
                  --repo "${{ github.repository }}")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Uploading to release: $TAG"

      - name: Upload zips to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for zip in extensions/*.zip; do
            gh release upload "${{ steps.tag.outputs.tag }}" "$zip" \
              --clobber --repo "${{ github.repository }}"
          done

      - name: Summary
        run: |
          {
            echo "## Blender Extension Release"
            echo ""
            echo "Uploaded to \`${{ steps.tag.outputs.tag }}\`:"
            echo ""
            for zip in extensions/*.zip; do
              echo "- $(basename "$zip")"
            done
          } >> "$GITHUB_STEP_SUMMARY"
