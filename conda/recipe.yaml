schema_version: 1

context:
  # Keep in sync with pyproject.toml [project] version
  version: "0.8.0.dev0"

package:
  name: mmgpy
  version: ${{ version }}

source:
  - path: ..

build:
  number: 0
  script:
    - if: unix
      then: build.sh
    - if: win
      then: bld.bat

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake >=3.15
    - ninja
  host:
    - python
    - pybind11 >=3.0.0
    - numpy
    - mmgsuite * vtk*
    - vtk >=9.6,<9.7
  run:
    - python
    - numpy >=2.0.2
    - meshio >=5.3.5
    - pyvista >=0.47.0
    - rich >=13.0.0
    - scipy >=1.11.0,<2
    - mmgsuite * vtk*
    # conda-forge ships VTK 9.6 for all Python versions, so no marker split
    # needed here (unlike pyproject.toml which allows 9.5.x for Python <3.14).
    - vtk >=9.6,<9.7
    - if: python < '3.11'
      then: typing-extensions >=4.0.0

tests:
  - python:
      imports:
        - mmgpy
        - mmgpy._mmgpy
  - script:
      - if: unix
        then:
          # MMG -h returns exit code 2; just verify executables are on PATH
          - mmg3d_O3 -h || test $? -eq 2
          - mmg2d_O3 -h || test $? -eq 2
          - mmgs_O3 -h || test $? -eq 2
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"
      - if: win
        then:
          - mmg3d_O3.exe -h || ver >nul
          - mmg2d_O3.exe -h || ver >nul
          - mmgs_O3.exe -h || ver >nul
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"

about:
  homepage: https://github.com/kmarchais/mmgpy
  license: MIT
  license_file: LICENSE
  summary: Python bindings for the MMG mesh generation/optimization library
  description: |
    mmgpy provides Python bindings for the MMG library, enabling 2D, 3D,
    and surface mesh remeshing through both a Python API and CLI tools.
  repository: https://github.com/kmarchais/mmgpy
