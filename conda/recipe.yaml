schema_version: 1

context:
  # Keep in sync with pyproject.toml [project] version
  version: "0.6.0.dev0"

package:
  name: mmgpy
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  script:
    - if: unix
      then: bash build.sh
    - if: win
      then: cmd /c bld.bat

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.15
    - ninja
    - git
  host:
    - python
    - pip
    - scikit-build-core >=0.11.5
    - pybind11 >=3.0.0
    - numpy >=2.0.2
    - vtk >=9.5,<9.6
  # MMG shared libraries are installed to $PREFIX/lib; pin so downstream
  # conda packages that link against them get a compatible mmgpy at runtime.
  run_exports:
    - ${{ pin_subpackage('mmgpy', max_pin='x.x') }}
  run:
    - python
    - numpy >=2.0.2
    - meshio >=5.3.5
    - pyvista >=0.46.4
    - rich >=13.0.0
    - scipy >=1.11.0,<1.17
    - vtk >=9.5,<9.6
    - if: python < '3.11'
      then: typing-extensions >=4.0.0

tests:
  - python:
      imports:
        - mmgpy
        - mmgpy._mmgpy
      pip_check: true
  - script:
      - if: unix
        then:
          - mmg3d_O3 -h
          - mmg2d_O3 -h
          - mmgs_O3 -h
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"
      - if: win
        then:
          - mmg3d_O3.exe -h
          - mmg2d_O3.exe -h
          - mmgs_O3.exe -h
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"

about:
  homepage: https://github.com/kmarchais/mmgpy
  license: MIT
  license_file: LICENSE
  summary: Python bindings for the MMG mesh generation/optimization library
  description: |
    mmgpy provides Python bindings for the MMG library, enabling 2D, 3D,
    and surface mesh remeshing through both a Python API and CLI tools.
    MMG libraries and executables are installed to standard conda paths,
    making them available to other packages in the environment.
  repository: https://github.com/kmarchais/mmgpy
